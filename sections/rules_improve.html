<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../scrollbar.css" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: transparent;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        color: #1a2540;
      }
      .section-shell,
      .block,
      .number-list {
        display: grid;
        gap: 12px;
      }
      .section-shell {
        gap: 18px;
      }
      .block-title {
        font-size: 22px;
        font-weight: 900;
        color: #243252;
      }
      .number-item {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: white;
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 8px 18px rgba(88, 109, 165, 0.06);
      }
      .number-badge {
        min-width: 38px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eef3ff, #f2fbff);
        color: #4e69ba;
        font-weight: 900;
        font-size: 14px;
        flex-shrink: 0;
      }
      .number-text {
        flex: 1;
        font-size: 15px;
        line-height: 1.8;
        color: #1a2540;
        word-break: keep-all;
      }
    </style>
    <script src="../info/rule.js"></script>
  </head>

  <body>
    <div class="section-shell">
      <div class="block">
        <div class="block-title">규칙</div>
        <div class="number-list" id="ruleList"></div>
      </div>

      <div class="block">
        <div class="block-title">개선사항</div>
        <div class="number-list" id="improvementList"></div>
      </div>
    </div>

    <script>
      function createItem(number, text) {
        const item = document.createElement("div");
        item.className = "number-item";
        item.innerHTML = `
          <div class="number-badge">${number}</div>
          <div class="number-text">${text}</div>
        `;
        return item;
      }

      function renderObjectList(targetId, data) {
        const target = document.getElementById(targetId);
        target.innerHTML = "";

        Object.entries(data)
          .sort((a, b) => Number(a[0]) - Number(b[0]))
          .forEach(([number, text]) => {
            target.appendChild(createItem(number, text));
          });
      }

      renderObjectList("ruleList", rule);
      renderObjectList("improvementList", improvement);
    </script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../scrollbar.css" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: transparent;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        color: #1a2540;
      }
      .section-shell,
      .number-list {
        display: grid;
        gap: 12px;
      }
      .number-item {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: white;
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 8px 18px rgba(88, 109, 165, 0.06);
      }
      .number-badge {
        min-width: 38px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eef3ff, #f2fbff);
        color: #4e69ba;
        font-weight: 900;
        font-size: 14px;
        flex-shrink: 0;
      }
      .number-text {
        flex: 1;
        font-size: 15px;
        line-height: 1.8;
        color: #1a2540;
        word-break: keep-all;
      }
    </style>
    <script src="../info/rule.js"></script>
  </head>

  <body>
    <div class="section-shell">
      <div class="number-list" id="charmList"></div>
    </div>

    <script>
      function createItem(number, text) {
        const item = document.createElement("div");
        item.className = "number-item";
        item.innerHTML = `
          <div class="number-badge">${number}</div>
          <div class="number-text">${text}</div>
        `;
        return item;
      }

      const charmList = document.getElementById("charmList");

      charm.forEach((text, index) => {
        charmList.appendChild(createItem(index + 1, text));
      });
    </script>
  </body>
</html>

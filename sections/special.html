<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../scrollbar.css" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: transparent;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        color: #1a2540;
      }

      .section-shell {
        display: grid;
        gap: 16px;
      }

      .search-box {
        display: flex;
        gap: 10px;
        align-items: center;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(244, 248, 255, 0.96)
        );
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 18px;
        padding: 12px 14px;
        box-shadow: 0 8px 18px rgba(88, 109, 165, 0.06);
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1 1 220px;
        min-width: 0;
        border: none;
        outline: none;
        background: transparent;
        font: inherit;
        font-size: 15px;
        color: #1a2540;
      }

      .search-input::placeholder {
        color: #8a97b3;
      }

      .sort-select {
        flex: 0 0 auto;
        border: 1px solid rgba(122, 143, 191, 0.16);
        outline: none;
        padding: 10px 12px;
        border-radius: 12px;
        background: white;
        font: inherit;
        color: #1a2540;
        font-size: 14px;
        cursor: pointer;
      }

      .search-meta {
        font-size: 14px;
        color: #657393;
        line-height: 1.7;
        padding: 0 4px;
      }

      .timeline {
        display: grid;
        gap: 16px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 14px;
        align-items: start;
      }

      .timeline-date {
        background: linear-gradient(135deg, #eef3ff, #f2fbff);
        color: #4e69ba;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 900;
        text-align: center;
      }

      .timeline-card {
        background: white;
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 22px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(88, 109, 165, 0.06);
      }

      .timeline-title {
        font-size: 18px;
        font-weight: 900;
        margin-bottom: 10px;
        color: #1a2540;
      }

      .timeline-body {
        color: #1a2540;
        line-height: 1.8;
        font-size: 15px;
      }

      .empty-state {
        border: 1px dashed rgba(122, 143, 191, 0.24);
        border-radius: 20px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.7);
        color: #73819d;
        line-height: 1.8;
        font-size: 14px;
      }

      mark {
        background: linear-gradient(135deg, #eef3ff, #dff4ff);
        color: #2a3f8f;
        padding: 2px 6px;
        border-radius: 6px;
        font-weight: 800;
      }

      @media (max-width: 760px) {
        .timeline-item {
          grid-template-columns: 1fr;
        }

        .timeline-date {
          text-align: left;
        }

        .sort-select {
          width: 100%;
        }
      }

      .rich-gray {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 8px;
        background: #eef1f5;
        color: #475569;
        font-weight: 700;
      }

      .rich-highlight {
        padding: 2px 6px;
        border-radius: 6px;
        background: linear-gradient(135deg, #fff7a8, #ffe76a);
        color: #4b3f00;
        font-weight: 800;
      }

      .rich-bold {
        font-weight: 900;
      }

      .rich-italic {
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="section-shell">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="날짜나 행사이름 검색 예: 3/13, 반장선거, 이름외우기"
          oninput="renderTimeline()"
        />

        <select id="sortSelect" class="sort-select" onchange="renderTimeline()">
          <option value="latest">최신순</option>
          <option value="oldest">과거순</option>
        </select>
      </div>

      <div class="search-meta" id="searchMeta">총 0개의 기록</div>

      <div class="timeline" id="timeline"></div>
    </div>
    <script src="../info/special.js"></script>
    <script>
      const timeline = document.getElementById("timeline");
      const searchInput = document.getElementById("searchInput");
      const searchMeta = document.getElementById("searchMeta");
      const sortSelect = document.getElementById("sortSelect");

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function applyRichText(text) {
        return text
          .replace(/\$\$(.*?)\$\$/g, '<span class="rich-bold">$1</span>')
          .replace(/%%(.*?)%%/g, '<span class="rich-italic">$1</span>')
          .replace(/\*\*(.*?)\*\*/g, '<span class="rich-gray">$1</span>')
          .replace(/!!(.*?)!!/g, '<span class="rich-highlight">$1</span>');
      }

      function highlightText(text, keyword) {
        let safeText = escapeHtml(text);
        safeText = applyRichText(safeText);

        if (!keyword) return safeText.replace(/\n/g, "<br />");

        const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(`(${escapedKeyword})`, "gi");

        return safeText
          .replace(regex, "<mark>$1</mark>")
          .replace(/\n/g, "<br />");
      }

      function parseDate(dateText) {
        const match = String(dateText)
          .trim()
          .match(/^(\d{1,2})\/(\d{1,2})$/);

        if (!match) {
          return new Date(2026, 0, 1);
        }

        const month = Number(match[1]);
        const day = Number(match[2]);
        return new Date(2026, month - 1, day);
      }

      function renderTimeline() {
        const keyword = searchInput.value.trim().toLowerCase();
        const sortType = sortSelect.value;

        let filtered = events.filter((event) => {
          const target =
            `${event.date} ${event.title} ${event.body}`.toLowerCase();
          return target.includes(keyword);
        });

        filtered.sort((a, b) => {
          const dateA = parseDate(a.date);
          const dateB = parseDate(b.date);

          if (sortType === "latest") {
            return dateB - dateA;
          }

          return dateA - dateB;
        });

        searchMeta.textContent = `총 ${filtered.length}개의 기록`;
        timeline.innerHTML = "";

        if (filtered.length === 0) {
          timeline.innerHTML = `
            <div class="empty-state">
              검색된 기록이 없습니다.<br />
              날짜나 행사 이름으로 다시 검색해보세요.
            </div>
          `;
          return;
        }

        filtered.forEach((event) => {
          const item = document.createElement("div");
          item.className = "timeline-item";

          item.innerHTML = `
            <div class="timeline-date">${highlightText(event.date, keyword)}</div>
            <div class="timeline-card">
              <div class="timeline-title">${highlightText(event.title, keyword)}</div>
              <div class="timeline-body">${highlightText(event.body, keyword)}</div>
            </div>
          `;

          timeline.appendChild(item);
        });
      }

      renderTimeline();
    </script>
  </body>
</html>
